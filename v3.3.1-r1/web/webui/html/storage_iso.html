<!-- ISO storage configuration and monitoring dashboard with status and metrics -->
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h3" id="main-storiso-header">[ iso ]</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <div class="btn-group me-2">
            <button type="button" id="main-storiso-btn-config" class="btn btn-sm btn-outline-secondary disabled">Config</button>
            <button type="button" id="main-storiso-btn-json" class="btn btn-sm btn-outline-secondary">JSON</button>
        </div>
    </div>
</div>

<!-- Menu section with refresh button -->
<div class="row row-space g-1 border-bottom mb-3">
    <div class="col-lg-3 rounded-3 col-md-offset-2 mb-2">
        <div class="row row-space pb-2 d-flex align-items-center">
            <div class="btn-toolbar mb-md-0">
                <div class="btn-group me-2"></div>
            </div>
        </div>    
    </div>
    
    <div class="col-lg-2 rounded-3 col-md-offset-2 mb-2">
        <div class="row row-space pb-2 d-flex align-items-center">
            <div class="btn-toolbar mb-md-0"></div>
        </div>    
    </div>
    
    <div class="col-lg-2 rounded-3 col-md-offset-2">
        <div class="row row-space pb-2 d-flex align-items-center">
            <div class="btn-toolbar mb-md-0">
                <div class="btn-group me-2"></div>
            </div>
        </div>    
    </div>
    
    <div class="col-lg-3 rounded-3 col-md-offset-2">
        <div class="row row-space pb-2 d-flex align-items-center">
            <div class="btn-toolbar mb-md-0">
                <div class="btn-group me-2"></div>
            </div>
        </div>    
    </div>
    
    <div class="col-lg-2 rounded-3 col-md-offset-2">
        <div class="row row-space pb-2 d-flex align-items-center float-end">
            <div class="btn-toolbar mb-md-0">
                <div class="btn-group me-2">
                    <button type="button" id="main-storiso-btn-refresh" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-arrow-repeat" style="font-size: 1.25rem"></i>
                        <div class="ms-1">
                            <div>Refresh</div>
                        </div>
                    </button>    
                </div>
            </div>
        </div>    
    </div>            
</div>

<!-- Status section with state accordion -->
<div class="row row-space g-1 mt-2 pt-2">
    <div class="col-lg-12 border rounded-3 p-1 bg-light col-md-offset-2">
        <div class="row row-space pb-2">
            <div class="col-lg-11 d-flex align-items-center mt-1 ms-2">
                <i class="bi bi-activity" style="font-size: 1.25rem"></i>
                <div class="ms-2 mt-1">
                    <div><h5>Status</h5></div>
                </div>
            </div>
        </div>
    </div>        

    <!-- State panel showing cluster services -->
    <div class="accordion mt-1" id="accordionStorisoState">
        <div class="accordion-item">
            <h2 class="accordion-header" id="heading-stor-iso-state">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseStorisoState">
                    <i class="bi bi-activity" style="font-size: 1.25rem"></i>
                    <div class="ms-3">
                        <div id="main-storiso-state">State [<b>UNKNOWN</b>]</div>
                    </div>
                </button>
            </h2>

            <div id="collapseStorisoState" class="accordion-collapse collapse" data-bs-parent="#accordionStorisoState">
                <div class="accordion-body">
                    <h6>Cluster Services</h6>
                    <table id="storisoStatusServiceTable" class="table table-outline table-striped table-hover">
                        <thead>
                            <tr>
                                <th style="width: 10%">[ service ]</th>
                                <th style="width: 10%">[ version ]</th>
                                <th style="width: 10%">[ owner ]</th>
                                <th style="width: 10%">[ owner id ]</th>
                                <th style="width: 10%">[ updated ]</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Configuration section with node/name panels -->
<div class="row row-space g-1 mt-2 pt-2">
    <div class="col-lg-12 border rounded-3 p-1 bg-light col-md-offset-2">
        <div class="row row-space pb-2">
            <div class="col-lg-11 d-flex align-items-center mt-1 ms-2">
                <i class="bi bi-pencil-square" style="font-size: 1.25rem"></i>
                <div class="ms-2 mt-1">
                    <div><h5>Configuration</h5></div>
                </div>
            </div>
        </div>
    </div>        

    <!-- Node/Name configuration accordion -->
    <div class="accordion mt-1" id="accordionStorisoConfig">
        <!-- Node panel showing cluster services -->
        <div class="accordion-item">
            <h2 class="accordion-header" id="heading-storiso-node">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseStorisoNode">
                    <i class="bi bi-view-stacked" style="font-size: 1.25rem"></i>
                    <div class="ms-3">
                        <div id="main-isodev-node">Node [<b>UNKNOWN</b>]</div>
                    </div>
                </button>
            </h2>

            <div id="collapseStorisoNode" class="accordion-collapse collapse" data-bs-parent="#accordionStorisoConfig">
                <div class="accordion-body">
                    <h6>Cluster Services</h6>
                    <table id="storisoStatusServiceTable" class="table table-outline table-striped table-hover">
                        <thead>
                            <tr>
                                <th style="width: 10%">[ service ]</th>
                                <th style="width: 10%">[ version ]</th>
                                <th style="width: 10%">[ owner ]</th>
                                <th style="width: 10%">[ owner id ]</th>
                                <th style="width: 10%">[ updated ]</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Name panel showing ISO details -->
        <div class="accordion-item">
            <h2 class="accordion-header" id="heading-storiso-xx">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseNodeState">
                    <i class="bi bi-hash" style="font-size: 1.25rem"></i>
                    <div class="ms-3">
                        <div id="main-isodev-name">Name [<b>UNKNOWN</b>]</div>
                    </div>
                </button>
            </h2>

            <div id="collapseNodeState" class="accordion-collapse collapse" data-bs-parent="#accordionStorisoConfig">
                <div class="accordion-body">
                    <h6>ISO Name</h6>
                    <table id="storisoNameTable" class="table table-outline table-striped table-hover">
                        <thead>
                            <tr>
                                <th style="width: 10%">[ name ]</th>
                                <th style="width: 5%">[ id ]</th>
                                <th style="width: 10%">[ group ]</th>
                                <th style="width: 20%">[ description ]</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ISO section with image panel -->
<div class="row row-space g-1 mt-2 pt-2">
    <div class="col-lg-12 border rounded-3 p-1 bg-light col-md-offset-2">
        <div class="row row-space pb-2">
            <div class="col-lg-11 d-flex align-items-center mt-1 ms-2">
                <i class="bi bi-vinyl" style="font-size: 1.25rem"></i>
                <div class="ms-2 mt-1">
                    <div><h5>ISO</h5></div>
                </div>
            </div>
        </div>
    </div>        

    <!-- Image panel showing ISO data -->
    <div class="accordion mt-1" id="accordionStoriso">
        <!-- Image panel with ISO path/source -->
        <div class="accordion-item">
            <h2 class="accordion-header" id="heading-storiso-type">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseStorisoType">
                    <i class="bi bi-vinyl" style="font-size: 1.25rem"></i>
                    <div class="ms-3">
                        <div id="main-isodev-image">Image [<b>UNKNOWN</b>]</div>
                    </div>
                </button>
            </h2>

            <div id="collapseStorisoType" class="accordion-collapse collapse" data-bs-parent="#accordionStoriso">
                <div class="accordion-body">
                    <h6>ISO Data</h6>
                    <table id="storisoIsoTable" class="table table-outline table-striped table-hover">
                        <thead>
                            <tr>
                                <th style="width: 10%">[ image ]</th>
                                <th style="width: 10%">[ source ]</th>
                                <th style="width: 10%">[ path ]</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
